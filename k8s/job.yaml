apiVersion: batch/v1
kind: Job
metadata:
  name: cumulonimbus-collection
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: cumulonimbus
          image: sltcnb/cumulonimbus:latest
          args: ["aws", "collect", "--service", "all", "--output", "/data"]
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: secret-key
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          volumeMounts:
            - name: output
              mountPath: /data
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: cumulonimbus-output
