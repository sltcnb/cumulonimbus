title: Kubernetes Anonymous Secret Access
id: 8f1e0a2c-1b3d-4e5f-9a7b-cumulus000002
status: experimental
description: Anonymous or unauthenticated principal reading Secrets via the API server.
logsource:
  product: kubernetes
  service: audit
detection:
  selection:
    event.dataset: k8s.audit
    orchestrator.resource.type: secrets
    k8s.verb:
      - get
      - list
      - watch
    user.name:
      - system:anonymous
      - system:unauthenticated
  condition: selection
level: critical
tags:
  - attack.credential_access
  - attack.t1552.007
