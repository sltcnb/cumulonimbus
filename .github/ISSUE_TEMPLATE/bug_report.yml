name: Bug report
description: Report a problem with Cumulonimbus
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not include real evidence, credentials,
        or non-redacted logs.** For security issues, see SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands run (with sensitive values redacted) and the output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `cumulonimbus --version`.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`.
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - AWS
        - Azure
        - GCP
        - Kubernetes
        - Not provider-specific
    validations:
      required: false
